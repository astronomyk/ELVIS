# =============================================================================
# Full catalog list (varies by instrument)
# =============================================================================
_reference_catalogs_by_instrument:
  eris: [MARCS, PHOENIX, SWIRE]
  fors2: [Kinney, Kurucz, MARCS, PHOENIX, Pickles, SWIRE, Various]
  uves: [Kinney, Kurucz, MARCS, PHOENIX, Pickles, SWIRE, Various]
