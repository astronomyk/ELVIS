# =============================================================================
# ESO ETC 2.0 - ERIS Input Options (JSON API Schema)
# =============================================================================
# Web UI: https://etc.eso.org/eris
# API endpoint: https://etc.eso.org/observing/etc/etcapi/Eris/
#   Method: POST, Content-Type: application/json
#   Body: JSON input form (this schema)
#   Upload: ?filename=<name>&data=<url-encoded-json> with file in multipart body
#   Upload docs: https://etc.eso.org/doc/upload.html
#   CLI script: etc_cli.py (see misc/ESO_scripts/)
#
# Instrument: ERIS (Enhanced Resolution Imager and Spectrograph)
# Telescope: VLT UT4 (Yepun), Cassegrain focus
# Sub-instruments: SPIFFIER (IFS), NIX (Imager)
# IP Version: 117.12
#
# This file documents ALL input options for the ERIS ETC JSON input form.
# Structure mirrors the actual JSON keys used by the API.
# Sources: ETC saved HTML pages, JSON input forms, ESO instrument docs,
#          SM Rules, ETC help pages, etc_cli.py
#
# NOTE: Two JSON format variants exist (see notes at bottom of file).
#       This file documents the format produced by the web UI.
# =============================================================================


# =============================================================================
# target
# =============================================================================
target:

  # ---------------------------------------------------------------------------
  # target.morphology
  # ---------------------------------------------------------------------------
  morphology:
    morphologytype:
      type: radio
      options:
        - value: "point"
          description: "Point Source (spatially unresolved)"

        - value: "extended"
          description: "Extended Source (spatially resolved)"
          requires:
            extendedtype:
              type: select
              options:
                - value: "infinite"
                  description: "Infinite uniform extended source (per arcsec^2)"
                - value: "sersic"
                  description: "Sersic profile"
                  requires:
                    index:
                      type: float
                      description: "Sersic index (1=exponential, 4=de Vaucouleurs)"
                      example: 1
                    radius:
                      type: float
                      unit: arcsec
                      description: "Effective (half-light) radius"
                      example: 0.5

  # ---------------------------------------------------------------------------
  # target.sed
  # ---------------------------------------------------------------------------
  sed:
    sedtype:
      type: radio
      options:

        # --- Option 1: Spectrum (continuum source) ---
        - value: "spectrum"
          description: "Continuum source defined by a spectral shape"
          requires:
            spectrum:
              spectrumtype:
                type: select
                options:

                  - value: "template"
                    description: "Stellar or galaxy template from catalog"
                    requires:
                      params:
                        catalog:
                          type: select
                          description: "Template catalog"
                          options:
                            - value: "MARCS"
                              description: "MARCS 1D LTE model atmospheres"
                              id_format: "Teff:logg"
                              id_example: "5750:4.5"
                            - value: "PHOENIX"
                              description: "PHOENIX model atmospheres (T/L/M dwarfs)"
                              note: "Template params change dynamically"
                            - value: "SWIRE"
                              description: "SWIRE galaxy templates"
                              note: "Template params change dynamically"
                        id:
                          type: string
                          description: "Template identifier (catalog-dependent)"
                          example: "5750:4.5"

                  - value: "blackbody"
                    description: "Planck function"
                    requires:
                      params:
                        temperature:
                          type: float
                          unit: K
                          description: "Blackbody temperature"
                          example: 1000

                  - value: "powerlaw"
                    description: "Power law spectrum F_lambda ~ lambda^exponent"
                    requires:
                      params:
                        exponent:
                          type: float
                          description: "Power law exponent"
                          example: 0

                  - value: "upload"
                    description: "User-uploaded spectrum file"

        # --- Option 2: Emission Line ---
        - value: "emissionline"
          description: "Single Gaussian emission line (no continuum)"
          requires:
            emissionline:
              params:
                lambda:
                  type: float
                  unit: nm
                  description: "Central wavelength of emission line"
                  example: 1000
                fwhm:
                  type: float
                  unit: nm
                  description: "Full width at half maximum"
                  example: 1

    extinctionav:
      type: float
      unit: mag
      description: "Interstellar extinction A_V"
      default: 0

    redshift:
      description: "Redshift and barycentric velocity correction"
      enabled:
        type: checkbox
        formcontrolname: "redshiftEnabled"
        default: false
      redshiftType:
        type: radio
        options:
          - value: "redshift"
            description: "Cosmological redshift z"
          - value: "radialVelocity"
            description: "Radial velocity (km/s)"
      redshift:
        type: float
        description: "Redshift z (when redshiftType=redshift)"
        default: 0
      baryvelcor:
        type: float
        unit: km/s
        description: "Barycentric velocity correction"
        default: 0

  # ---------------------------------------------------------------------------
  # target.brightness
  # ---------------------------------------------------------------------------
  brightness:
    brightnesstype:
      value: "mag"

    magband:
      type: select
      description: "Photometric band for normalisation"
      options:
        standard: [U, B, V, R, I, Y, J, H, K, L, M, N]
        gaia: [gaia_GBP, gaia_G, gaia_GRP]
        sdss: [sdss_u, sdss_g, sdss_r, sdss_i, sdss_z]
        decam: [DECam_g, DECam_r, DECam_i, DECam_z]
        lsst: [lsst_u, lsst_g, lsst_r, lsst_i, lsst_z, lsst_y]
        vista: [VISTA_Y, VISTA_Z, VISTA_J, VISTA_H, VISTA_Ks]
        4most: [4MOST_Johnson_B, 4MOST_Johnson_V, 4MOST_Cousins_R, 4MOST_Cousins_I]
      total_count: 39

    mag:
      type: float
      description: "Apparent magnitude (per arcsec^2 for extended sources)"
      default: 10

    magsys:
      type: select
      options:
        - value: "vega"
        - value: "AB"


# =============================================================================
# sky
# =============================================================================
sky:
  airmass:
    type: float
    description: "Target airmass"
    default: 1.2

  fli:
    type: float
    description: "Fractional Lunar Illumination (0=new, 1=full)"
    range: {min: 0.0, max: 1.0}
    default: 1

  moonDistance:
    type: float
    unit: degrees
    description: "Moon-Target angular separation"
    default: 30

  waterVapour:
    type: float
    unit: mm
    description: "Precipitable Water Vapour (PWV)"
    default: 30
    note: "See _reference_pwv_options for standard values"


# =============================================================================
# seeing  (Seeing / Image Quality / AO)
# =============================================================================
seeing:
  turbulence_category:
    type: select
    description: "Atmospheric turbulence percentile (ERIS: 6 categories)"
    options:
      - value: 10
        label: "10% (seeing <= 0.6 arcsec)"
        max_airmass: 2.0
      - value: 20
        label: "20% (seeing <= 0.7 arcsec)"
        max_airmass: 2.0
      - value: 30
        label: "30% (seeing <= 0.8 arcsec)"
        max_airmass: 2.0
      - value: 50
        label: "50% (seeing <= 1.0 arcsec)"
        max_airmass: 1.96
      - value: 70
        label: "70% (seeing <= 1.15 arcsec)"
        max_airmass: 1.55
      - value: 85
        label: "85% (seeing <= 1.4 arcsec)"
        max_airmass: 1.12
    default: 50

  SEQ.TTS.MAG:
    type: float
    description: "LGS R Magnitude of tip-tilt star (for LGS AO mode)"
    default: 0

  separation:
    type: float
    unit: arcsec
    description: "Target-to-guide-star separation"
    default: 0
    note: "0 = on-axis. NGS: <30 arcsec recommended."

  aperturepix:
    type: select
    description: "Extraction aperture diameter in pixels for S/N calculation"
    options: [1, 3, 5, 7, 9, 11, 13, 15, 17, 21, 35, 55, 89]
    default: 9


# =============================================================================
# instrument
# =============================================================================
instrument:

  # ---------------------------------------------------------------------------
  # The web UI has two separate dropdowns: observingMode and aoMode.
  # The JSON payload combines them as ins_configuration: "{mode}_{ao}"
  # e.g. "ifs_lgs", "img_ngs", "sam_noao", etc.
  # ---------------------------------------------------------------------------

  # --- Observing Mode (UI dropdown id="observingMode") ---
  observingMode:
    type: select
    options:
      - value: "ifs"
        label: "IFS (SPIFFIER)"
      - value: "img"
        label: "Imaging (NIX)"
      - value: "sam"
        label: "SAM (NIX)"
      - value: "app"
        label: "APP (NIX)"
      - value: "lss"
        label: "LSS (NIX)"

  # --- AO Mode (UI dropdown id="aoMode") ---
  aoMode:
    type: select
    options:
      - value: "lgs"
        label: "LGS (Laser Guide Star)"
      - value: "ngs"
        label: "NGS (Natural Guide Star)"
      - value: "noao"
        label: "No AO (seeing-limited)"

  # --- Combined JSON key ---
  ins_configuration:
    description: "Constructed as '{observingMode}_{aoMode}'"
    examples:
      - "ifs_lgs"
      - "ifs_ngs"
      - "ifs_noao"
      - "img_lgs"
      - "img_ngs"
      - "img_noao"
      - "sam_lgs"
      - "sam_ngs"
      - "app_lgs"
      - "app_ngs"
      - "lss_lgs"
      - "lss_ngs"
      - "lss_noao"

  # ===========================================================================
  # IFS (SPIFFIER) sub-parameters
  # Shown when observingMode = "ifs"
  # ===========================================================================
  INS.BAND.NAME:
    type: select
    description: "Grating / spectral band (IFS mode)"
    shown_when: "observingMode = ifs"
    options:
      # Low resolution (R ~ 5000-5600, full band)
      - value: "J_low"
        band: J
        resolution: ~5000
        wavelength_range_um: [1.09, 1.42]
      - value: "H_low"
        band: H
        resolution: ~5600
        wavelength_range_um: [1.45, 1.87]
      - value: "K_low"
        band: K
        resolution: ~5600
        wavelength_range_um: [1.93, 2.48]
      # High resolution (R ~ 10000-11200, half band)
      - value: "J_short"
        band: J
        resolution: ~10000
        wavelength_range_um: [1.10, 1.25]
      - value: "J_middle"
        band: J
        resolution: ~10000
        wavelength_range_um: [1.17, 1.33]
      - value: "J_long"
        band: J
        resolution: ~10000
        wavelength_range_um: [1.25, 1.43]
      - value: "H_short"
        band: H
        resolution: ~10000
        wavelength_range_um: [1.46, 1.66]
      - value: "H_middle"
        band: H
        resolution: ~10000
        wavelength_range_um: [1.56, 1.77]
      - value: "H_long"
        band: H
        resolution: ~10000
        wavelength_range_um: [1.66, 1.87]
      - value: "K_short"
        band: K
        resolution: ~11200
        wavelength_range_um: [1.93, 2.20]
      - value: "K_middle"
        band: K
        resolution: ~11200
        wavelength_range_um: [2.07, 2.35]
      - value: "K_long"
        band: K
        resolution: ~11200
        wavelength_range_um: [2.20, 2.47]

  INS.SPXW.NAME:
    type: select
    description: "Plate scale / spaxel size (IFS mode)"
    shown_when: "observingMode = ifs"
    options:
      - value: "25mas"
        spaxel_size_mas: [12.5, 25]
        fov_arcsec: [0.8, 0.8]
      - value: "100mas"
        spaxel_size_mas: [50, 100]
        fov_arcsec: [3.2, 3.2]
      - value: "250mas"
        spaxel_size_mas: [125, 250]
        fov_arcsec: [8.0, 8.0]

  # ===========================================================================
  # NIX sub-parameters
  # Shown when observingMode = "img", "sam", "app", or "lss"
  # ===========================================================================
  DET.READOUT:
    type: select
    description: "Detector readout mode (NIX modes)"
    shown_when: "observingMode in [img, sam, app, lss]"
    options:
      - value: "SLOW"
        min_dit_s: 1.6
      - value: "FAST"
        min_dit_s: 0.034

  INS.NXCW.NAME:
    type: select
    description: "Camera wheel / pixel scale (NIX imaging & SAM)"
    shown_when: "observingMode in [img, sam]"
    options:
      - value: "13mas-JHK"
        pixel_scale_mas: 13
        fov_arcsec: [26, 26]
        wavelength_range_um: [1.0, 2.5]
      - value: "27mas-JHK"
        pixel_scale_mas: 27
        fov_arcsec: [55, 55]
        wavelength_range_um: [1.0, 2.5]
      - value: "13mas-LM"
        pixel_scale_mas: 13
        fov_arcsec: [26, 26]
        wavelength_range_um: [2.5, 5.3]

  INS.NXPW.NAME:
    type: select
    description: "Pupil wheel (ND filter or aperture mask)"
    options_by_mode:
      img:
        - value: "noND"
          description: "No neutral density filter"
      sam:
        - value: "SAM-7"
          description: "7-hole sparse aperture mask"
        - value: "SAM-9"
          description: "9-hole sparse aperture mask"
        - value: "SAM-23"
          description: "23-hole sparse aperture mask"

  INS.NXFW.NAME:
    type: select
    description: "Filter wheel (NIX modes: img, sam, app)"
    shown_when: "observingMode in [img, sam, app]"
    options:
      # Broadband
      - value: "J"
        center_um: 1.28
        type: broadband
        cameras: [13mas-JHK, 27mas-JHK]
      - value: "H"
        center_um: 1.66
        type: broadband
        cameras: [13mas-JHK, 27mas-JHK]
      - value: "Ks"
        center_um: 2.18
        type: broadband
        cameras: [13mas-JHK, 27mas-JHK]
      - value: "Short-Lp"
        center_um: 3.32
        type: broadband
        cameras: [13mas-LM]
      - value: "L-Broad"
        center_um: 3.57
        fwhm_um: 1.04
        type: broadband
        cameras: [13mas-LM]
      - value: "Lp"
        center_um: 3.79
        type: broadband
        cameras: [13mas-LM]
      - value: "Mp"
        center_um: 4.78
        type: broadband
        cameras: [13mas-LM]
      # Narrowband
      - value: "Pa-b"
        center_um: 1.282
        type: narrowband
        line: "Paschen-beta"
        cameras: [13mas-JHK, 27mas-JHK]
      - value: "Fe-II"
        center_um: 1.644
        type: narrowband
        line: "[Fe II]"
        cameras: [13mas-JHK, 27mas-JHK]
      - value: "H2-cont"
        center_um: 2.068
        type: narrowband
        line: "H2 continuum"
        cameras: [13mas-JHK, 27mas-JHK]
      - value: "H2-1-0S"
        center_um: 2.120
        type: narrowband
        line: "H2 1-0 S(1)"
        cameras: [13mas-JHK, 27mas-JHK]
      - value: "Br-g"
        center_um: 2.172
        type: narrowband
        line: "Brackett-gamma"
        cameras: [13mas-JHK, 27mas-JHK]
      - value: "K-peak"
        center_um: 2.198
        type: narrowband
        cameras: [13mas-JHK, 27mas-JHK]
      - value: "IB-2.42"
        center_um: 2.420
        type: narrowband
        cameras: [13mas-JHK, 27mas-JHK]
      - value: "IB-2.48"
        center_um: 2.479
        type: narrowband
        cameras: [13mas-JHK, 27mas-JHK]
      - value: "Br-a-cont"
        center_um: 3.965
        type: narrowband
        line: "Brackett-alpha continuum"
        cameras: [13mas-LM]
      - value: "Br-a"
        center_um: 4.051
        type: narrowband
        line: "Brackett-alpha"
        cameras: [13mas-LM]
    note_app: "APP mode: only K and L narrowband filters (K-peak, Ks, Lp)"

  # LSS mode has no filter/camera selection
  lss_fixed_params:
    description: "NIX Long-Slit Spectroscopy (fixed configuration)"
    shown_when: "observingMode = lss"
    spectral_resolution: ~900
    wavelength_range_um: [3.05, 4.05]
    slit_width_mas: 86


# =============================================================================
# timesnr  (Exposure Time / Signal-to-Noise)
# =============================================================================
timesnr:
  mode:
    type: radio
    options:
      - value: "nexp"
        description: "Enter DIT and NDIT, ETC calculates S/N"
      - value: "snr"
        description: "Enter target S/N, ETC calculates required NDIT"

  DET.DIT:
    type: float
    unit: s
    description: "Detector Integration Time (single exposure duration)"
    default: 2
    constraints:
      - "If DIT > 150s: must be 180, 300, 450, 600, or 900 s"
      - "NIX SLOW min DIT: 1.6s"
      - "NIX FAST min DIT: 0.034s"

  DET.NDIT:
    type: integer
    description: "Number of detector integrations"
    default: 1
    note: "Total integration = DIT x NDIT (excludes overheads)"


# =============================================================================
# output  (Selectable Output Plots)
# =============================================================================
output:
  description: "Boolean flags to enable/disable output plots"

  snr:
    snr:
      type: boolean
      default: true
      description: "S/N ratio per spectral pixel"
    noise_components:
      type: boolean
      default: true
      description: "Dynamic S/N formula"

  sed:
    target:
      type: boolean
      default: false
      description: "Target SED spectrum"
    sky:
      type: boolean
      default: false
      description: "Sky SED spectrum"

  signals:
    obstarget:
      type: boolean
      default: false
      description: "Observed target signal (e-/pixel/DIT)"
    obssky:
      type: boolean
      default: false
      description: "Observed sky signal (e-/pixel/DIT)"
    obstotal:
      type: boolean
      default: false
      description: "Total observed signal (target + sky)"

  maxsignals:
    maxpixeltarget:
      type: boolean
      default: false
      description: "Target contribution to max pixel"
    maxpixelsky:
      type: boolean
      default: false
      description: "Sky contribution to max pixel"
    maxpixeltotal:
      type: boolean
      default: false
      description: "Total max pixel value"

  throughput:
    atmosphere:
      type: boolean
      default: false
      description: "Atmospheric transmission"
    telescope:
      type: boolean
      default: false
      description: "Telescope reflectivity efficiency"
    instrument:
      type: boolean
      default: false
      description: "Instrument efficiency"
    encircledenergy:
      type: boolean
      default: false
      description: "Encircled energy fraction"
    detector:
      type: boolean
      default: false
      description: "Detector QE"
    totalinclsky:
      type: boolean
      default: false
      description: "Total throughput including sky"

  dispersion:
    dispersion:
      type: boolean
      default: false
      description: "Spectral dispersion per pixel"

  psf:
    psf:
      type: boolean
      default: false
      description: "Point Spread Function"


# =============================================================================
# instrumentName (top-level key)
# =============================================================================
instrumentName:
  type: string
  value: "eris"


