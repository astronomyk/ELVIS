      - 3800
      - 3900
      - 4000
      - 4250
      - 4500
      - 4750
      - 5000
      - 5250
      - 5500
      - 5750
      - 6000
      - 6250
      - 6500
      - 6750
      - 7000
      - 7250
      - 7500
      - 7750
      - 8000
