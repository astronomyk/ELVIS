# =============================================================================
# API Response Structure (output from etc_cli.py / etc_json2ascii.py)
# =============================================================================
# The API returns JSON with this structure (ERIS has no orders):
#
#   {
#     "data": {
#       "detectors": [
#         {
#           "name": "<detector>",
#           "wavelength": [<float>, ...],       # wavelength array (nm)
#           "plots": {
#             "<groupkey>": {                   # matches output toggle groups
#               "<serieskey>": [<float>, ...]   # same length as wavelength
#             }
#           }
#         }
#       ]
#     }
#   }
#
# For multi-order instruments (e.g. CRIRES):
#   data.orders[].order, data.orders[].detectors[]
# =============================================================================


# =============================================================================
# NOTE: JSON Format Variants
# =============================================================================
# Two JSON formats have been observed:
#
# Format A (Web UI / eris_etc_inputform.json):
#   - sky: {airmass, fli, waterVapour, moonDistance}
#   - seeing: {turbulence_category, separation, aperturepix, SEQ.TTS.MAG}
#   - instrument.ins_configuration: "ifs_lgs" (combined mode_ao)
#
# Format B (eris_nix.json / eris_spiffier.json):
#   - sky: {airmass, moon_fli, pwv}
#   - seeingiqao: {mode: "aolgs", params: {gsmag, separation, turbulence_category}, aperturepix}
#   - instrument.ins_configuration: "IFS" or "nixIMG" (mode only, AO in seeingiqao)
#
# Both formats are accepted by the API. Format A is what the web UI generates.
# =============================================================================
